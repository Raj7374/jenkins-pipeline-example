name: Basic CI Pipeline

on:
  push:
    branches: [ "main" ]        # Trigger when code is pushed to main
  pull_request:
    branches: [ "main" ]        # Trigger when PR targets main

jobs:
  build-and-test:
    runs-on: ubuntu-latest      # Use Ubuntu runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v3   # Pulls your repo code

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'        # Install Node.js v18

      - name: Install dependencies
        run: npm install            # Install project dependencies

      - name: Run tests
        run: npm test               # Run test suite

      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-results/       # Save test reports as artifacts

