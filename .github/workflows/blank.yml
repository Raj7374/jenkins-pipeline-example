name: Basic Workflow

on: 
  push:        # Trigger when code is pushed
    branches: [ "main" ]

jobs:
  hello-world:
    runs-on: ubuntu-latest   # Use GitHub’s Ubuntu runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v3   # Pulls your repo code

      - name: Print Hello
        run: echo "Hello GitHub Actions!"
